<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Plataforma de Treinamentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-container {
            text-align: center;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .logo-container img {
            max-width: 350px;
            height: auto;
            margin-bottom: 15px;
        }

        .logo-container h2 {
            color: #1a1a1a;
            font-size: 22px;
            font-weight: 600;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border-color: #4FC3DC;
        }

        .card-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .card-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .card-btn {
            background: #4FC3DC;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card-btn:hover {
            background: #3ab0c9;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .modal-content button {
            width: 100%;
            padding: 15px;
            background: #4FC3DC;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .modal-content button:hover {
            background: #3ab0c9;
        }

        .modulo-screen {
            background: white;
            padding: 40px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .btn-voltar {
            background: #666;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn-voltar:hover {
            background: #555;
        }

        .arena-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .arena-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 20px 0;
        }

        .arena-card h2 {
            color: #9b59b6;
            margin-bottom: 20px;
        }

        .arena-card input, .arena-card select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .arena-card label {
            display: block;
            margin: 15px 0 5px 0;
            font-weight: 600;
            color: #333;
        }

        .btn-arena {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }

        .btn-arena:hover {
            background: #8e44ad;
        }

        #qrcodeArena {
            text-align: center;
            margin: 20px 0;
        }

        .sessao-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .sessao-info h3 {
            color: #9b59b6;
            margin-bottom: 15px;
        }

        .codigo-sessao {
            font-size: 48px;
            font-weight: 700;
            color: #9b59b6;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="https://orievogroup.github.io/orievosafetylearning/logo_gde.png" alt="Logo GDE">
            <h2>GDE - Plataforma de Treinamentos</h2>
        </div>

        <div id="telaInicial">
            <div class="cards-container">
                <div class="card" onclick="abrirModulo('seguranca')">
                    <div class="card-icon">🛡️</div>
                    <div class="card-title">Segurança no Trabalho</div>
                    <div class="card-desc">EPIs e Prevenção de Acidentes</div>
                    <button class="card-btn">ACESSAR</button>
                </div>

                <div class="card" onclick="abrirModulo('lideranca')">
                    <div class="card-icon">👔</div>
                    <div class="card-title">Líder de Excelência</div>
                    <div class="card-desc">Desenvolvimento de Habilidades</div>
                    <button class="card-btn">ACESSAR</button>
                </div>

                <div class="card" onclick="abrirModulo('arena')">
                    <div class="card-icon">🎮</div>
                    <div class="card-title">Arena Ao Vivo</div>
                    <div class="card-desc">Quiz e Nuvem em Tempo Real</div>
                    <button class="card-btn">ACESSAR</button>
                </div>
            </div>
        </div>

        <div id="telaModulo" class="hidden">
            <button class="btn-voltar" onclick="voltarInicio()">← Voltar</button>
            <div id="conteudoModulo"></div>
        </div>

        <div id="modalLogin" class="modal">
            <div class="modal-content">
                <h2 id="modalTitulo">Acessar Módulo</h2>
                <input type="password" id="inputSenha" placeholder="Senha">
                <input type="text" id="inputNome" placeholder="Seu Nome">
                <input type="email" id="inputEmail" placeholder="Seu Email">
                <button onclick="validarLogin()">ENTRAR</button>
            </div>
        </div>
    </div>

    <!-- QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Firebase SDK INLINE -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyARUq5PhuNa45_Na6SNPveRX_lcucTRkRA",
            authDomain: "dislub-equador.firebaseapp.com",
            databaseURL: "https://dislub-equador-default-rtdb.firebaseio.com",
            projectId: "dislub-equador",
            storageBucket: "dislub-equador.firebasestorage.app",
            messagingSenderId: "160052415363",
            appId: "1:160052415363:web:f17df9700cd511122504b6",
            measurementId: "G-SHMCTNHGBX"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        console.log('🔥 Firebase inicializado com sucesso!');
        
        // Tornar funções Firebase acessíveis globalmente
        window.firebaseDB = database;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebaseReady = true;
    </script>

    <script>
        const MODULOS = {
            seguranca: {
                nome: 'Segurança no Trabalho',
                senha: 'Seguranca2026',
                mensagem: 'Módulo de segurança em desenvolvimento.'
            },
            lideranca: {
                nome: 'Líder de Excelência',
                senha: 'Lider2026',
                mensagem: 'Módulo de liderança em desenvolvimento.'
            },
            arena: {
                nome: 'Arena Ao Vivo',
                senha: 'Arena2026GDE',
                tipo: 'arena'
            }
        };

        let moduloAtual = null;

        function abrirModulo(id) {
            moduloAtual = id;
            const modulo = MODULOS[id];
            document.getElementById('modalTitulo').textContent = modulo.nome;
            document.getElementById('modalLogin').classList.add('active');
        }

        function validarLogin() {
            const senha = document.getElementById('inputSenha').value;
            const nome = document.getElementById('inputNome').value;
            const email = document.getElementById('inputEmail').value;
            const modulo = MODULOS[moduloAtual];

            if (senha === modulo.senha && nome && email) {
                document.getElementById('modalLogin').classList.remove('active');
                mostrarModulo();
            } else {
                alert('Preencha todos os campos corretamente!');
            }
        }

        function mostrarModulo() {
            const modulo = MODULOS[moduloAtual];
            document.getElementById('telaInicial').classList.add('hidden');
            document.getElementById('telaModulo').classList.remove('hidden');
            
            const conteudo = document.getElementById('conteudoModulo');
            
            if (modulo.tipo === 'arena') {
                mostrarArena(conteudo);
            } else {
                conteudo.innerHTML = `
                    <div class="modulo-screen">
                        <h1>${modulo.nome}</h1>
                        <p>${modulo.mensagem}</p>
                    </div>
                `;
            }
        }

        function voltarInicio() {
            document.getElementById('telaModulo').classList.add('hidden');
            document.getElementById('telaInicial').classList.remove('hidden');
            document.getElementById('inputSenha').value = '';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputEmail').value = '';
        }

        function mostrarArena(container) {
            container.innerHTML = `
                <div class="arena-container">
                    <div class="arena-card">
                        <h2>🎮 Arena Ao Vivo - Criar Sessão</h2>
                        
                        <label>Nome da Sessão:</label>
                        <input type="text" id="nomeSessao" placeholder="Ex: DDS Terça-feira">
                        
                        <label>Selecione Atividades:</label>
                        <div style="margin: 15px 0;">
                            <label><input type="checkbox" id="quiz1"> Quiz: EPIs Básicos</label><br>
                            <label><input type="checkbox" id="nuvem1"> Nuvem de Palavras</label><br>
                            <label><input type="checkbox" id="quiz2"> Quiz: NR-6</label>
                        </div>
                        
                        <label>Modo:</label>
                        <select id="modoSessao">
                            <option value="individual">Individual</option>
                            <option value="equipes">Por Equipes</option>
                        </select>
                        
                        <button class="btn-arena" onclick="criarSessao()">🚀 CRIAR SESSÃO</button>
                    </div>
                </div>
            `;
        }

        function criarSessao() {
            const nome = document.getElementById('nomeSessao').value;
            if (!nome) {
                alert('Digite o nome da sessão!');
                return;
            }

            const codigo = gerarCodigo();
            const atividades = [];
            if (document.getElementById('quiz1').checked) atividades.push('quiz1');
            if (document.getElementById('nuvem1').checked) atividades.push('nuvem1');
            if (document.getElementById('quiz2').checked) atividades.push('quiz2');

            if (atividades.length === 0) {
                alert('Selecione pelo menos uma atividade!');
                return;
            }

            const modo = document.getElementById('modoSessao').value;
            const linkSessao = window.location.origin + window.location.pathname + '?codigo=' + codigo;

            document.getElementById('conteudoModulo').innerHTML = `
                <div class="arena-container">
                    <div class="arena-card">
                        <h2>✅ Sessão Criada com Sucesso!</h2>
                        
                        <div class="sessao-info">
                            <h3>📋 Informações da Sessão</h3>
                            <p><strong>Nome:</strong> ${nome}</p>
                            <p><strong>Modo:</strong> ${modo === 'individual' ? '👤 Individual' : '👥 Equipes'}</p>
                            <p><strong>Atividades:</strong> ${atividades.length}</p>
                        </div>
                        
                        <h3 style="text-align: center; margin: 30px 0 10px 0;">Código da Sessão:</h3>
                        <div class="codigo-sessao">${codigo}</div>
                        
                        <div id="qrcodeArena"></div>
                        
                        <div style="text-align: center; margin: 20px 0;">
                            <p><strong>Link:</strong></p>
                            <p style="word-break: break-all; color: #666;">${linkSessao}</p>
                            <button class="btn-arena" onclick="copiarLink('${linkSessao}')">📋 Copiar Link</button>
                        </div>
                        
                        <button class="btn-arena" style="width: 100%;">▶ INICIAR SESSÃO (DEMO)</button>
                        
                        <button class="btn-voltar" onclick="voltarInicio()" style="width: 100%; margin-top: 20px;">← Criar Nova Sessão</button>
                    </div>
                </div>
            `;

            setTimeout(() => {
                new QRCode(document.getElementById("qrcodeArena"), {
                    text: linkSessao,
                    width: 200,
                    height: 200
                });
            }, 100);

            salvarSessaoFirebase(codigo, nome, atividades, modo);
        }

        function gerarCodigo() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let codigo = '';
            for (let i = 0; i < 6; i++) {
                codigo += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return codigo;
        }

        function copiarLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ Link copiado!\n\nCompartilhe com seus alunos.');
            });
        }

        function salvarSessaoFirebase(codigo, nome, atividades, modo) {
            if (window.firebaseReady) {
                const sessaoData = {
                    nome: nome,
                    atividades: atividades,
                    modo: modo,
                    status: 'aguardando',
                    criado: new Date().toISOString()
                };
                
                const dbRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                window.firebaseSet(dbRef, sessaoData)
                    .then(() => {
                        console.log('🔥 Sessão salva no Firebase:', codigo);
                        console.log('📦 Dados:', sessaoData);
                    })
                    .catch((error) => {
                        console.error('❌ Erro ao salvar:', error);
                    });
            } else {
                console.warn('⚠️ Firebase ainda não está pronto');
            }
        }

        window.addEventListener('load', function() {
            console.log('✅ Página carregada');
            
            const params = new URLSearchParams(window.location.search);
            const codigo = params.get('codigo');
            if (codigo) {
                console.log('🎮 Código detectado:', codigo);
                if (window.firebaseReady) {
                    const dbRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                    window.firebaseOnValue(dbRef, (snapshot) => {
                        const sessao = snapshot.val();
                        if (sessao) {
                            alert('Sessão encontrada: ' + sessao.nome + '\n\nTela do aluno em desenvolvimento.');
                        } else {
                            alert('Sessão não encontrada: ' + codigo);
                        }
                    }, { onlyOnce: true });
                }
            }
        });
    </script>
</body>
</html>
