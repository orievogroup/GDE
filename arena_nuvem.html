<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Nuvem - Orievo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #E0F6FF 0%, #ffffff 100%);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            padding: 20px;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .btn:hover { background: #2980b9; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin: 10px 0;
        }
        .hidden { display: none; }
        .codigo {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            color: #3498db;
            letter-spacing: 8px;
            margin: 20px 0;
        }
        #qrcode {
            text-align: center;
            margin: 20px 0;
        }
        .palavra {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            animation: aparecer 0.3s;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>☁️ ARENA NUVEM</h1>
        <p>Grupo Dislub Equador | Powered by Orievo</p>
    </div>

    <div class="container">
        <div id="telaInicial">
            <div class="card">
                <h2 style="text-align: center; margin-bottom: 20px;">Criar Nuvem de Palavras</h2>
                <input type="password" id="senha" placeholder="Senha">
                <input type="text" id="instrutor" placeholder="Nome do Instrutor">
                <button class="btn" onclick="login()">ENTRAR</button>
            </div>
        </div>

        <div id="telaFormulario" class="hidden">
            <div class="card">
                <h2>Criar Nuvem</h2>
                <input type="text" id="nomeNuvem" placeholder="Nome da Sessão">
                <input type="text" id="temaNuvem" value="O que é segurança para você?" placeholder="Tema/Pergunta">
                <button class="btn" onclick="criarNuvem()">☁️ CRIAR NUVEM</button>
            </div>
        </div>

        <div id="telaSessao" class="hidden">
            <div class="card">
                <h2 style="text-align: center; color: #28a745;">✅ Nuvem Criada!</h2>
                <div class="codigo" id="codigoDisplay"></div>
                <div id="qrcode"></div>
                <p style="text-align: center; margin: 20px 0;">
                    <strong>Tema:</strong><br>
                    <span id="temaDisplay" style="color: #666;"></span>
                </p>
                <p style="text-align: center; margin: 20px 0;">
                    <strong>Link:</strong><br>
                    <span id="linkDisplay" style="word-break: break-all; color: #666;"></span>
                </p>
                <button class="btn" onclick="copiarLink()">📋 Copiar Link</button>
                <p style="text-align: center; margin: 20px 0; font-size: 20px;">
                    👥 Participantes: <span id="countPart">0</span>
                </p>
                <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin: 20px 0;">
                    <h3 style="text-align: center; color: #3498db; margin-bottom: 20px;">☁️ Palavras Enviadas</h3>
                    <div id="listaPalavras"></div>
                </div>
                <button class="btn" style="background: #e74c3c;" onclick="fechar()">🔒 FECHAR NUVEM</button>
            </div>
        </div>

        <div id="telaAluno" class="hidden">
            <div class="card">
                <h2 style="text-align: center;">☁️ Entrar na Nuvem</h2>
                <p style="text-align: center; margin: 10px 0;">Código: <strong id="codigoAluno"></strong></p>
                <input type="text" id="nomeAluno" placeholder="Digite seu nome">
                <button class="btn" onclick="entrar()">ENTRAR</button>
            </div>
        </div>

        <div id="telaEnviar" class="hidden">
            <div class="card">
                <h2 style="text-align: center; color: #3498db;">☁️ Nuvem de Palavras</h2>
                <p style="text-align: center; font-size: 18px; margin: 20px 0; font-weight: 600;" id="temaPergunta"></p>
                <input type="text" id="palavraInput" placeholder="Digite uma palavra..." maxlength="30">
                <button class="btn" onclick="enviarPalavra()">ENVIAR PALAVRA</button>
                <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 30px;">
                    <h3 style="color: #3498db; margin-bottom: 15px;">📝 Minhas Palavras:</h3>
                    <div id="minhasPalavras"></div>
                </div>
            </div>
        </div>

        <div id="telaFechada" class="hidden">
            <div class="card">
                <h2 style="text-align: center; color: #e74c3c;">🔒 Nuvem Fechada</h2>
                <p style="text-align: center; margin: 20px 0; color: #666;">A nuvem foi encerrada pelo instrutor.</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, update, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const app = initializeApp({
            apiKey: "AIzaSyARUq5PhuNa45_Na6SNPveRX_lcucTRkRA",
            databaseURL: "https://dislub-equador-default-rtdb.firebaseio.com",
            projectId: "dislub-equador"
        });
        
        window.db = getDatabase(app);
        window.dbRef = ref;
        window.dbSet = set;
        window.dbUpdate = update;
        window.dbOnValue = onValue;
        window.firebaseReady = true;
        console.log('✅ Firebase carregado!');
    </script>
    <script>
        let codigo = null;
        let nome = null;

        function login() {
            console.log('🔐 login() chamado');
            const s = document.getElementById('senha').value;
            const n = document.getElementById('instrutor').value;
            console.log('Senha:', s, 'Nome:', n);
            if (s === 'Nuvem2026' && n) {
                console.log('✅ Login OK');
                document.getElementById('telaInicial').classList.add('hidden');
                document.getElementById('telaFormulario').classList.remove('hidden');
            } else {
                alert('Senha: Nuvem2026');
            }
        }

        function criarNuvem() {
            console.log('☁️ criarNuvem() chamado');
            const nome = document.getElementById('nomeNuvem').value;
            const tema = document.getElementById('temaNuvem').value;
            console.log('Nome:', nome, 'Tema:', tema);
            if (!nome || !tema) { alert('Preencha todos os campos!'); return; }
            
            if (!window.firebaseReady) {
                alert('⏳ Aguarde, Firebase carregando...');
                return;
            }
            
            codigo = gerarCodigo();
            console.log('Código gerado:', codigo);
            const link = window.location.origin + window.location.pathname + '?n=' + codigo;
            
            document.getElementById('codigoDisplay').textContent = codigo;
            document.getElementById('temaDisplay').textContent = tema;
            document.getElementById('linkDisplay').textContent = link;
            
            document.getElementById('telaFormulario').classList.add('hidden');
            document.getElementById('telaSessao').classList.remove('hidden');
            
            console.log('Criando QR Code...');
            new QRCode(document.getElementById("qrcode"), {text: link, width: 200, height: 200});
            
            console.log('Salvando no Firebase...');
            window.dbSet(window.dbRef(window.db, 'nuvens/' + codigo), {
                nome: nome,
                tema: tema,
                status: 'ativa',
                participantes: {},
                palavras: {}
            }).then(() => {
                console.log('✅ Nuvem salva no Firebase!');
                monitorarPalavras();
            }).catch(err => {
                console.error('❌ Erro ao salvar:', err);
                alert('Erro ao criar nuvem: ' + err.message);
            });
            
            window.dbOnValue(window.dbRef(window.db, 'nuvens/' + codigo + '/participantes'), (snap) => {
                const p = snap.val();
                document.getElementById('countPart').textContent = p ? Object.keys(p).length : 0;
            });
            
            window.dbOnValue(window.dbRef(window.db, 'nuvens/' + codigo + '/palavras'), (snap) => {
                const p = snap.val();
                const lista = document.getElementById('listaPalavras');
                if (!p) {
                    lista.innerHTML = '<p style="text-align: center; color: #999;">Aguardando palavras...</p>';
                    return;
                }
                let html = '';
                Object.values(p).forEach(w => {
                    html += `<div class="palavra"><strong style="font-size: 18px;">${w.palavra}</strong>
                             <p style="opacity: 0.8; font-size: 14px; margin-top: 5px;">Por: ${w.autor}</p></div>`;
                });
                lista.innerHTML = html;
            });
        }

        function gerarCodigo() {
            const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let r = '';
            for (let i = 0; i < 6; i++) r += c.charAt(Math.floor(Math.random() * c.length));
            return r;
        }

        function copiarLink() {
            navigator.clipboard.writeText(document.getElementById('linkDisplay').textContent);
            alert('✅ Link copiado!');
        }

        function fechar() {
            if (confirm('Fechar nuvem?')) {
                window.dbUpdate(window.dbRef(window.db, 'nuvens/' + codigo), {status: 'fechada'});
                alert('✅ Nuvem fechada!');
            }
        }

        function enviarPalavra() {
            const palavra = document.getElementById('palavraInput').value.trim();
            if (!palavra) { alert('Digite uma palavra!'); return; }
            
            const id = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            window.dbSet(window.dbRef(window.db, 'nuvens/' + codigo + '/palavras/' + id), {
                palavra: palavra,
                autor: nome,
                timestamp: Date.now()
            });
            
            document.getElementById('palavraInput').value = '';
            document.getElementById('palavraInput').focus();
        }

        function monitorarPalavras() {
            window.dbOnValue(window.dbRef(window.db, 'nuvens/' + codigo + '/palavras'), (snap) => {
                const palavras = snap.val();
                const lista = document.getElementById('listaPalavras');
                
                if (!lista) return;
                
                if (!palavras) {
                    lista.innerHTML = '<p style="text-align: center; color: #999; padding: 30px;">Aguardando palavras...</p>';
                    return;
                }
                
                let html = '';
                Object.values(palavras).forEach(item => {
                    html += `
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 10px; margin: 10px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); animation: fadeIn 0.3s;">
                            <strong style="font-size: 20px; display: block; margin-bottom: 5px;">${item.palavra}</strong>
                            <p style="opacity: 0.8; font-size: 14px; margin: 0;">Por: ${item.autor}</p>
                        </div>
                    `;
                });
                
                lista.innerHTML = html;
            });
        }

        // ALUNO
        function entrar() {
            nome = document.getElementById('nomeAluno').value.trim();
            if (!nome) { alert('Digite seu nome!'); return; }
            
            const id = nome.toLowerCase().replace(/[^a-z0-9]/g, '_');
            window.dbSet(window.dbRef(window.db, 'nuvens/' + codigo + '/participantes/' + id), {nome: nome});
            
            window.dbOnValue(window.dbRef(window.db, 'nuvens/' + codigo), (snap) => {
                const n = snap.val();
                if (!n) return;
                
                if (n.status === 'fechada') {
                    document.getElementById('telaEnviar').classList.add('hidden');
                    document.getElementById('telaFechada').classList.remove('hidden');
                } else {
                    document.getElementById('temaPergunta').textContent = n.tema;
                    document.getElementById('telaAluno').classList.add('hidden');
                    document.getElementById('telaEnviar').classList.remove('hidden');
                    
                    window.dbOnValue(window.dbRef(window.db, 'nuvens/' + codigo + '/palavras'), (snap) => {
                        const p = snap.val();
                        const div = document.getElementById('minhasPalavras');
                        if (!p) {
                            div.innerHTML = '<p style="text-align: center; color: #999;">Você ainda não enviou palavras</p>';
                            return;
                        }
                        const minhas = Object.values(p).filter(w => w.autor === nome);
                        if (minhas.length === 0) {
                            div.innerHTML = '<p style="text-align: center; color: #999;">Você ainda não enviou palavras</p>';
                            return;
                        }
                        let html = '<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">';
                        minhas.forEach(w => {
                            html += `<span style="background: #3498db; color: white; padding: 8px 16px; border-radius: 20px; font-weight: 600;">${w.palavra}</span>`;
                        });
                        html += '</div>';
                        div.innerHTML = html;
                    });
                }
            });
        }

        function enviar() {
            const p = document.getElementById('palavraInput').value.trim();
            if (!p) { alert('Digite uma palavra!'); return; }
            
            const id = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            window.dbSet(window.dbRef(window.db, 'nuvens/' + codigo + '/palavras/' + id), {
                palavra: p,
                autor: nome,
                timestamp: Date.now()
            });
            
            document.getElementById('palavraInput').value = '';
            document.getElementById('palavraInput').focus();
        }

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const n = params.get('n');
            if (n) {
                codigo = n;
                window.dbOnValue(window.dbRef(window.db, 'nuvens/' + n), (snap) => {
                    if (snap.val()) {
                        document.getElementById('codigoAluno').textContent = n;
                        document.getElementById('telaInicial').classList.add('hidden');
                        document.getElementById('telaAluno').classList.remove('hidden');
                    } else {
                        alert('Nuvem não encontrada!');
                    }
                }, {onlyOnce: true});
            }
        });
    </script>
</body>
</html>
