    <!-- Script para detectar aluno ANTES de renderizar -->
    <script>
        // Executar ANTES da página carregar
        (function() {
            const params = new URLSearchParams(window.location.search);
            const codigo = params.get('codigo');
            
            // Se tem código na URL = ALUNO
            if (codigo) {
                // Adicionar CSS inline para esconder tela de login
                const style = document.createElement('style');
                style.textContent = '#telaInicial { display: none !important; }';
                document.head.appendChild(style);
                console.log('🎮 Modo ALUNO detectado - código:', codigo);
            }
        })();
    </script>

            height: 200px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, update, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyARUq5PhuNa45_Na6SNPveRX_lcucTRkRA",
            authDomain: "dislub-equador.firebaseapp.com",
            databaseURL: "https://dislub-equador-default-rtdb.firebaseio.com",
            projectId: "dislub-equador",
            storageBucket: "dislub-equador.firebasestorage.app",
            messagingSenderId: "160052415363",
            appId: "1:160052415363:web:f17df9700cd511122504b6"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        window.firebaseDB = database;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseUpdate = update;
        window.firebaseOnValue = onValue;
        window.firebaseReady = true;
        
        console.log('🔥 Firebase OK');
    </script>

    <script>
        const PERGUNTAS = {
            quiz1: [
                { 
                    pergunta: "Qual é a principal diferença de foco entre a Segurança do Trabalho (Ocupacional) e a Segurança de Processo, conforme o Caderno do Líder?", 
                    opcoes: [
                        "A segurança de processo lida apenas com EPIs, enquanto a ocupacional lida com válvulas de alívio.", 
                        "A segurança ocupacional foca em grandes catástrofes, enquanto a de processo foca em ergonomia.", 
                        "A segurança ocupacional foca no indivíduo, enquanto a de processo foca na integridade das instalações", 
                        "Não há diferença prática, pois ambas visam apenas o cumprimento da legislação trabalhista."
                    ], 
                    correta: 2 
                },
                { 
                    pergunta: "No contexto da gestão de barreiras, como são classificados os 'Procedimentos Operacionais' e as 'Permissões de Trabalho'?", 
                    opcoes: [
                        "Barreiras Reativas", 
                        "Barreiras físicas", 
                        "Barreiras administrativas", 
                        "Barreiras humanas"
                    ], 
                    correta: 2 
                },
                { 
                    pergunta: "O que significa tratar a segurança como um 'Valor' em vez de apenas uma 'Prioridade'?", 
                    opcoes: [
                        "Significa que a segurança é um princípio intrínseco que não oscila sob pressão.", 
                        "Significa delegar toda a responsabilidade para o departamento de SSMA.", 
                        "Significa investir o máximo de dinheiro possível em equipamentos novos.", 
                        "Significa que a segurança muda conforme a demanda de produção."
                    ], 
                    correta: 0 
                },
                { 
                    pergunta: "Qual destes NÃO é um dos 10 compromissos pela vida da GDE?", 
                    opcoes: [
                        "Atenção às mudanças", 
                        "Isole as energias", 
                        "Controle todas as fontes de ignição", 
                        "Produtividade em primeiro lugar"
                    ], 
                    correta: 3 
                }
            ]
        };

        let moduloAtual = null, sessaoAtual = null, nomeAluno = null, pontosAluno = 0;

        function fazerLogin() {
            const senha = document.getElementById('senhaLogin').value;
            const nome = document.getElementById('nomeLogin').value;
            const email = document.getElementById('emailLogin').value;

            console.log('Login tentado:', { senha, nome, email });

            if (senha === 'Arena2026GDE' && nome && email) {
                console.log('✅ Login OK');
                moduloAtual = 'arena';
                document.getElementById('telaInicial').classList.add('hidden');
                document.getElementById('telaModulo').classList.remove('hidden');
                mostrarArena(document.getElementById('conteudoModulo'));
            } else {
                console.log('❌ Login falhou');
                alert('⚠️ Preencha todos os campos corretamente!');
            }
        }

        // Detectar código na URL (modo aluno)
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const codigo = params.get('codigo');
            
            if (codigo) {
                console.log('🎮 Código detectado na URL:', codigo);
                
                // Aguardar Firebase carregar
                const aguardarFirebase = setInterval(() => {
                    if (window.firebaseReady) {
                        clearInterval(aguardarFirebase);
                        console.log('🔥 Firebase pronto, verificando sessão...');
                        
                        const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                        window.firebaseOnValue(sessaoRef, (snapshot) => {
                            if (snapshot.val()) {
                                console.log('✅ Sessão encontrada!');
                                mostrarTelaAluno(codigo);
                            } else {
                                alert('❌ Sessão não encontrada: ' + codigo);
                            }
                        }, { onlyOnce: true });
                    }
                }, 100);
                
                // Timeout de segurança
                setTimeout(() => {
                    clearInterval(aguardarFirebase);
                    if (!window.firebaseReady) {
                        alert('⏳ Firebase está demorando para carregar. Tente novamente.');
                    }
                }, 10000);
            }
        });

        function voltarInicio() {
            document.getElementById('telaModulo').classList.add('hidden');
            document.getElementById('telaAluno').classList.add('hidden');
            document.getElementById('telaInicial').classList.remove('hidden');
            document.getElementById('inputSenha').value = '';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputEmail').value = '';

        function gerarCodigo() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let codigo = '';
            for (let i = 0; i < 6; i++) codigo += chars.charAt(Math.floor(Math.random() * chars.length));
            return codigo;
        }

        function copiarLink(link) {
            navigator.clipboard.writeText(link).then(() => alert('✅ Link copiado!'));
        }

        function salvarSessaoFirebase(codigo, nome) {
            if (window.firebaseReady) {
                console.log('💾 Salvando no Firebase...');
                const dbRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                window.firebaseSet(dbRef, {
                    nome: nome, 
                    status: 'aguardando', 
                    criado: new Date().toISOString(), 
                    participantes: {},
                    respostas: {},
                    perguntaAtual: 0
                });
                console.log('✅ Salvo no Firebase!');
            }
        }

        function monitorarParticipantes(codigo) {
            if (window.firebaseReady) {
                const participantesRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/participantes');
                window.firebaseOnValue(participantesRef, (snapshot) => {
                    const participantes = snapshot.val();
                    const count = participantes ? Object.keys(participantes).length : 0;
                    const countEl = document.getElementById('countNum');
                    if (countEl) countEl.textContent = count;
                    
                    // Atualizar total de participantes no status
                    const totalEl = document.getElementById('totalParticipantes');
                    if (totalEl) totalEl.textContent = count;
                });
                
                // Monitorar status da sessão e respostas
                const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                window.firebaseOnValue(sessaoRef, (snapshot) => {
                    const sessao = snapshot.val();
                    if (sessao && sessao.status === 'quiz_ativo') {
                        // Mostrar status do quiz
                        const statusDiv = document.getElementById('statusQuiz');
                        if (statusDiv) statusDiv.style.display = 'block';
                        
                        // Contar quantos responderam
                        const participantes = sessao.participantes || {};
                        const respostas = sessao.respostas || {};
                        const perguntaAtual = sessao.perguntaAtual || 0;
                        
                        const totalParticipantes = Object.keys(participantes).length;
                        const totalRespostas = Object.keys(respostas).filter(key => 
                            respostas[key].pergunta === perguntaAtual
                        ).length;
                        
                        const responderamEl = document.getElementById('responderam');
                        if (responderamEl) responderamEl.textContent = totalRespostas;
                        
                        const statusTexto = document.getElementById('statusTexto');
                        if (statusTexto) {
                            if (totalRespostas === 0) {
                                statusTexto.textContent = '⏳ Aguardando respostas...';
                            } else if (totalRespostas < totalParticipantes) {
                                statusTexto.textContent = '📝 Alguns já responderam...';
                            } else if (totalRespostas === totalParticipantes && totalParticipantes > 0) {
                                statusTexto.innerHTML = '✅ <strong>TODOS RESPONDERAM!</strong> Pode liberar próxima pergunta.';
                                // Mostrar botão próxima pergunta
                                const btnProxima = document.getElementById('btnProxima');
                                if (btnProxima) btnProxima.style.display = 'block';
                            }
                        }
                    }
                });
            }
        }

                if (window.firebaseReady && sessaoAtual) {

        function monitorarNuvem(codigo) {
            if (window.firebaseReady) {
                const nuvemRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/nuvem');
                window.firebaseOnValue(nuvemRef, (snapshot) => {
                    const palavras = snapshot.val();
                    const listaPalavras = document.getElementById('listaPalavrasNuvem');
                    
                    if (!listaPalavras) return;
                    
                    if (!palavras) {
                        listaPalavras.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Nenhuma palavra enviada ainda.</p>';
                        return;
                    }
                    
                    let html = '<div style="display: grid; gap: 10px;">';
                    Object.values(palavras).forEach(item => {
                        html += `
                            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">

                                <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 14px;">Por: ${item.autor}</p>
                            </div>
                        `;
                    });
                    html += '</div>';
                    
                    listaPalavras.innerHTML = html;
                });
            }

                    const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + sessaoAtual);
                    window.firebaseUpdate(sessaoRef, {
                        status: 'nuvem_fechada'
                    });
                    alert('✅ Nuvem fechada!');
                }
            }

        function proximaPergunta() {
            if (window.firebaseReady && sessaoAtual) {
                const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + sessaoAtual);
                
                // Pegar pergunta atual
                window.firebaseOnValue(sessaoRef, (snapshot) => {
                    const sessao = snapshot.val();
                    const perguntaAtual = (sessao.perguntaAtual || 0) + 1;
                    
                    // Verificar se ainda tem perguntas
                    if (perguntaAtual >= PERGUNTAS.quiz1.length) {
                        alert('✅ Quiz finalizado!\n\nTodas as perguntas foram respondidas.');
                        // Voltar para aguardando
                        window.firebaseUpdate(sessaoRef, {
                            status: 'finalizado',
                            perguntaAtual: null
                        });
                        
                        // Esconder status e botão
                        const statusDiv = document.getElementById('statusQuiz');
                        const btnProxima = document.getElementById('btnProxima');
                        if (statusDiv) statusDiv.style.display = 'none';
                        if (btnProxima) btnProxima.style.display = 'none';
                        
                        return;
                    }
                    
                    // Liberar próxima pergunta
                    window.firebaseUpdate(sessaoRef, {
                        perguntaAtual: perguntaAtual,
                        timestamp: Date.now()
                    });
                    
                    // Esconder botão até todos responderem novamente
                    const btnProxima = document.getElementById('btnProxima');
                    if (btnProxima) btnProxima.style.display = 'none';
                    
                    const statusTexto = document.getElementById('statusTexto');
                    if (statusTexto) statusTexto.textContent = '⏳ Aguardando respostas...';
                    
                    const responderamEl = document.getElementById('responderam');
                    if (responderamEl) responderamEl.textContent = '0';
                    
                }, { onlyOnce: true });
            }
        }

        function mostrarRanking() {
            const rankingArea = document.getElementById('rankingArea');
            const rankingLista = document.getElementById('rankingLista');
            
            if (rankingArea.style.display === 'none') {
                rankingArea.style.display = 'block';
                
                if (window.firebaseReady && sessaoAtual) {
                    const participantesRef = window.firebaseRef(window.firebaseDB, 'sessions/' + sessaoAtual + '/participantes');
                    window.firebaseOnValue(participantesRef, (snapshot) => {
                        const participantes = snapshot.val();
                        
                        if (!participantes) {
                            rankingLista.innerHTML = '<p style="text-align: center; color: #999; padding: 30px;">Nenhum participante ainda.</p>';
                            return;
                        }
                        
                        // Converter para array e ordenar por pontos
                        const ranking = Object.values(participantes).sort((a, b) => (b.pontos || 0) - (a.pontos || 0));
                        
                        let html = '';
                        ranking.forEach((participante, index) => {
                            const classe = index === 0 ? 'primeiro' : index === 1 ? 'segundo' : index === 2 ? 'terceiro' : '';
                            const posicao = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}º`;
                            
                            html += `
                                <div class="ranking-item ${classe}">
                                    <div class="ranking-posicao">${posicao}</div>
                                    <div class="ranking-nome">${participante.nome}</div>
                                    <div class="ranking-pontos">${participante.pontos || 0} pts</div>
                                </div>
                            `;
                        });
                        
                        rankingLista.innerHTML = html;
                    });
                }
            } else {
                rankingArea.style.display = 'none';
            }
        }

                        <div class="pontos-display">🏆 Seus pontos: <span id="pontosAluno">0</span></div>
                    </div>
                </div>
            `;
        }

        function escutarSessao(codigo, alunoId) {
            if (window.firebaseReady) {
                const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                window.firebaseOnValue(sessaoRef, (snapshot) => {
                    const sessao = snapshot.val();
                    if (sessao) {
                        // Verificar se deve mostrar ranking
                        if (sessao.mostrarRanking === true) {
                            mostrarRankingParaAluno(codigo);
                        }
                        // Verificar se nuvem está ativa
                        else if (sessao.status === 'nuvem_ativa') {
                            mostrarFormularioNuvem(codigo, nomeAluno, sessao.temaNuvem || 'O que é segurança para você?');
                        }
                        // Verificar se nuvem foi fechada
                        else if (sessao.status === 'nuvem_fechada') {
                            mostrarNuvemFechada(codigo, nomeAluno);
                        }
                        // Verificar se deve mostrar pergunta
                        else if (sessao.status === 'quiz_ativo' && sessao.perguntaAtual !== undefined) {
                            mostrarPergunta(codigo, alunoId, sessao.perguntaAtual);
                        }
                    }
                });
            }
        }

        function mostrarFormularioNuvem(codigo, nome, tema) {
            document.getElementById('conteudoAluno').innerHTML = `
                <div style="min-height: 70vh;">
                    <div class="aluno-screen">
                        <div style="text-align: center; margin-bottom: 20px;">
                            <img src="https://orievogroup.github.io/orievosafetylearning/logo_orievo_fundo_branco.png" alt="Orievo" style="height: 50px;">
                        </div>
                        
                        <h1 style="color: #3498db; text-align: center;">☁️ Nuvem de Palavras</h1>
                        <p style="font-size: 20px; margin: 20px 0; text-align: center; font-weight: 600; color: #333;">${tema}</p>
                        
                        <div style="margin: 30px 0;">
                            <input type="text" id="palavraNuvem" placeholder="Digite uma palavra..." 
                                   maxlength="30"
                                   style="width: 100%; padding: 18px; border: 2px solid #3498db; border-radius: 10px; font-size: 18px; margin: 15px 0;">
                            <button class="btn-arena" style="width: 100%; background: #3498db;" onclick="enviarPalavraNuvem('${codigo}', '${nome}')">
                                ENVIAR PALAVRA
                            </button>
                        </div>
                        
                        <div id="minhasPalavras" style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px;">
                            <h3 style="color: #3498db; margin-bottom: 15px;">📝 Minhas Palavras:</h3>
                            <div id="listaPalavrasAluno"></div>
                        </div>
                    </div>
                </div>
            `;
            
            // Monitorar palavras do aluno
            monitorarMinhasPalavras(codigo, nome);
        }

        function enviarPalavraNuvem(codigo, nome) {
            const palavra = document.getElementById('palavraNuvem').value.trim();
            if (!palavra) {
                alert('⚠️ Digite uma palavra!');
                return;
            }
            
            if (palavra.length > 30) {
                alert('⚠️ A palavra deve ter no máximo 30 caracteres!');
                return;
            }
            
            if (window.firebaseReady) {
                const palavraId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const palavraRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/nuvem/' + palavraId);
                window.firebaseSet(palavraRef, {
                    palavra: palavra,
                    autor: nome,
                    timestamp: Date.now()
                });
                
                document.getElementById('palavraNuvem').value = '';
                document.getElementById('palavraNuvem').focus();
            }
        }

        function monitorarMinhasPalavras(codigo, nome) {
            if (window.firebaseReady) {
                const nuvemRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/nuvem');
                window.firebaseOnValue(nuvemRef, (snapshot) => {
                    const palavras = snapshot.val();
                    const lista = document.getElementById('listaPalavrasAluno');
                    
                    if (!lista) return;
                    
                    if (!palavras) {
                        lista.innerHTML = '<p style="text-align: center; color: #999;">Você ainda não enviou nenhuma palavra.</p>';
                        return;
                    }
                    
                    const minhasPalavras = Object.values(palavras).filter(p => p.autor === nome);
                    
                    if (minhasPalavras.length === 0) {
                        lista.innerHTML = '<p style="text-align: center; color: #999;">Você ainda não enviou nenhuma palavra.</p>';
                        return;
                    }
                    
                    let html = '<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">';
                    minhasPalavras.forEach(item => {
                        html += `
                            <span style="background: #3498db; color: white; padding: 8px 16px; border-radius: 20px; font-weight: 600;">
                                ${item.palavra}
                            </span>
                        `;
                    });
                    html += '</div>';
                    
                    lista.innerHTML = html;
                });
            }
        }

        function mostrarNuvemFechada(codigo, nome) {
            document.getElementById('conteudoAluno').innerHTML = `
                <div style="min-height: 70vh;">
                    <div class="aluno-screen">
                        <div style="text-align: center; margin-bottom: 20px;">
                            <img src="https://orievogroup.github.io/orievosafetylearning/logo_orievo_fundo_branco.png" alt="Orievo" style="height: 50px;">
                        </div>
                        
                        <h1 style="color: #e74c3c;">🔒 Nuvem Fechada</h1>
                        <p style="font-size: 18px; margin: 20px 0; text-align: center;">A nuvem de palavras foi encerrada pelo instrutor.</p>
                        
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 30px;">
                            <p style="text-align: center; color: #666;">Aguardando próxima atividade...</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function mostrarRankingParaAluno(codigo) {
            if (window.firebaseReady) {
                const participantesRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/participantes');
                window.firebaseOnValue(participantesRef, (snapshot) => {
                    const participantes = snapshot.val();
                    
                    if (!participantes) {
                        return;
                    }
                    
                    // Ordenar por pontos
                    const ranking = Object.values(participantes).sort((a, b) => (b.pontos || 0) - (a.pontos || 0));
                    
                    // Criar tela de ranking visual
                    let html = `
                        <div class="tela-ranking-aluno">
                            <div style="text-align: center; margin-bottom: 20px;">
                                <img src="https://orievogroup.github.io/orievosafetylearning/logo_orievo_fundo_branco.png" alt="Orievo" style="height: 50px;">
                            </div>
                            
                            <div class="ranking-header-aluno">
                                <h1>🏆 RANKING FINAL</h1>
                                <p style="font-size: 18px;">Parabéns a todos os participantes!</p>
                            </div>
                            
                            <div class="podio-container">
                    `;
                    
                    // Top 3 no pódio
                    for (let i = 0; i < Math.min(3, ranking.length); i++) {
                        const participante = ranking[i];
                        const classe = i === 0 ? 'primeiro' : i === 1 ? 'segundo' : 'terceiro';
                        const medalha = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
                        const cor = i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : '#cd7f32';
                        const numero = i + 1;
                        
                        html += `
                            <div class="podio-posicao">
                                <div class="podio-medalha">${medalha}</div>
                                <div class="podio-nome" style="color: white;">${participante.nome}</div>
                                <div class="podio-pontos">${participante.pontos || 0} pts</div>
                                <div class="podio-bloco podio-bloco-${classe}">
                                    <div class="podio-numero">${numero}</div>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `</div>`;
                    
                    // Lista completa (a partir do 4º)
                    if (ranking.length > 3) {
                        html += `
                            <div class="ranking-lista-completa">
                                <div class="ranking-lista-titulo">Classificação Completa</div>
                        `;
                        
                        for (let i = 3; i < ranking.length; i++) {
                            const participante = ranking[i];
                            html += `
                                <div class="ranking-item" style="margin: 10px 0;">
                                    <div class="ranking-posicao">${i + 1}º</div>
                                    <div class="ranking-nome">${participante.nome}</div>
                                    <div class="ranking-pontos">${participante.pontos || 0} pts</div>
                                </div>
                            `;
                        }
                        
                        html += `</div>`;
                    }
                    
                    // Mensagem de parabéns personalizada
                    const minhaPosicao = ranking.findIndex(p => p.nome === nomeAluno) + 1;
                    if (minhaPosicao > 0) {
                        html += `
                            <div style="text-align: center; margin: 40px 20px; padding: 30px; background: white; border-radius: 15px;">
                                <h2 style="color: #9b59b6; margin-bottom: 10px;">Sua Posição</h2>
                                <p style="font-size: 48px; font-weight: 900; color: #333; margin: 20px 0;">${minhaPosicao}º lugar</p>
                                <p style="font-size: 20px; color: #666;">Você fez ${pontosAluno} pontos!</p>
                                ${minhaPosicao === 1 ? '<p style="font-size: 24px; margin-top: 20px;">🎉 <strong>PARABÉNS, CAMPEÃO!</strong> 🎉</p>' : ''}
                                ${minhaPosicao === 2 ? '<p style="font-size: 20px; margin-top: 20px;">🎊 Excelente resultado! 🎊</p>' : ''}
                                ${minhaPosicao === 3 ? '<p style="font-size: 20px; margin-top: 20px;">👏 Muito bem! 👏</p>' : ''}
                            </div>
                        `;
                    }
                    
                    html += `</div>`;
                    
                    document.getElementById('conteudoAluno').innerHTML = html;
                }, { onlyOnce: true });
            }
        }

        function mostrarPergunta(codigo, alunoId, indice) {
            const pergunta = PERGUNTAS.quiz1[indice];
            if (!pergunta) return;

            document.getElementById('conteudoAluno').innerHTML = `
                <div style="min-height: 70vh;">
                    <div class="aluno-screen">
                        <div style="text-align: center; margin-bottom: 15px;">
                            <img src="https://orievogroup.github.io/orievosafetylearning/logo_orievo_fundo_branco.png" alt="Orievo" style="height: 40px;">
                        </div>
                        
                        <div class="pontos-display">🏆 Seus pontos: <span id="pontosAluno">${pontosAluno}</span></div>
                        
                        <div class="quiz-pergunta">
                            <h2 style="margin-bottom: 25px;">${pergunta.pergunta}</h2>
                            <div>${pergunta.opcoes.map((opcao, i) => `
                                <div class="quiz-opcao" onclick="responder(${i}, ${pergunta.correta}, '${codigo}', '${alunoId}')">
                                    ${String.fromCharCode(65 + i)}) ${opcao}
                                </div>
                            `).join('')}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function responder(escolhida, correta, codigo, alunoId) {
            const opcoes = document.querySelectorAll('.quiz-opcao');
            opcoes.forEach(opcao => opcao.style.pointerEvents = 'none');

            const acertou = escolhida === correta;
            opcoes[escolhida].classList.add(acertou ? 'correta' : 'errada');
            if (!acertou) opcoes[correta].classList.add('correta');

            if (acertou) {
                pontosAluno += 100;
                
                // Atualizar pontos localmente
                const pontosEl = document.getElementById('pontosAluno');
                if (pontosEl) pontosEl.textContent = pontosAluno;
                
                // Atualizar no Firebase
                if (window.firebaseReady) {
                    const alunoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/participantes/' + alunoId);
                    window.firebaseUpdate(alunoRef, {
                        pontos: pontosAluno,
                        nome: nomeAluno,
                        ultimaResposta: Date.now()
                    }).then(() => {
                        console.log('✅ Pontos atualizados:', pontosAluno);
                    }).catch(err => {
                        console.error('❌ Erro ao atualizar pontos:', err);
                    });
                }
            }
            
            // Salvar resposta no Firebase
            if (window.firebaseReady) {
                const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                window.firebaseOnValue(sessaoRef, (snapshot) => {
                    const sessao = snapshot.val();
                    const perguntaAtual = sessao.perguntaAtual || 0;
                    
                    // Salvar resposta
                    const respostaRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/respostas/' + alunoId + '_' + perguntaAtual);
                    window.firebaseSet(respostaRef, {
                        alunoId: alunoId,
                        pergunta: perguntaAtual,
                        escolhida: escolhida,
                        correta: correta,
                        acertou: acertou,
                        timestamp: Date.now()
                    });
                }, { onlyOnce: true });
            }

            setTimeout(() => mostrarAguardando(codigo, nomeAluno), 3000);
        }

    </script>
</body>
</html>
