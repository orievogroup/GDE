<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Treinamentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-container {
            text-align: center;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .logo-container img {
            max-width: 350px;
            height: auto;
            margin-bottom: 15px;
        }

        .logo-container h2 {
            color: #1a1a1a;
            font-size: 22px;
            font-weight: 600;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border-color: #4FC3DC;
        }

        .card-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .card-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .card-btn {
            background: #4FC3DC;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card-btn:hover {
            background: #3ab0c9;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .modal-content button {
            width: 100%;
            padding: 15px;
            background: #4FC3DC;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .modal-content button:hover {
            background: #3ab0c9;
        }

        .modulo-screen {
            background: white;
            padding: 40px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .btn-voltar {
            background: #666;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn-voltar:hover {
            background: #555;
        }

        .arena-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .arena-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 20px 0;
        }

        .arena-card h2 {
            color: #9b59b6;
            margin-bottom: 20px;
        }

        .arena-card input, .arena-card select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .arena-card label {
            display: block;
            margin: 15px 0 5px 0;
            font-weight: 600;
            color: #333;
        }

        .btn-arena {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }

        .btn-arena:hover {
            background: #8e44ad;
        }

        #qrcodeArena {
            text-align: center;
            margin: 20px 0;
        }

        .sessao-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .sessao-info h3 {
            color: #9b59b6;
            margin-bottom: 15px;
        }

        .codigo-sessao {
            font-size: 48px;
            font-weight: 700;
            color: #9b59b6;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 8px;
        }

        /* TELA ALUNO */
        .aluno-screen {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .aluno-screen h1 {
            color: #9b59b6;
            margin-bottom: 20px;
        }

        .status-aguardando {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .status-aguardando h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .quiz-pergunta {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #9b59b6;
        }

        .quiz-pergunta h2 {
            color: #9b59b6;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .quiz-opcao {
            background: #f8f9fa;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-size: 18px;
        }

        .quiz-opcao:hover {
            background: #e9ecef;
            border-color: #9b59b6;
        }

        .quiz-opcao.correta {
            background: #d4edda;
            border-color: #28a745;
        }

        .quiz-opcao.errada {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .pontos-display {
            background: #9b59b6;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 24px;
            font-weight: 700;
        }

        .timer {
            font-size: 48px;
            font-weight: 700;
            color: #9b59b6;
            margin: 20px 0;
        }

        .participantes-count {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #004085;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="https://orievogroup.github.io/orievosafetylearning/logo_gde.png" alt="Logo GDE">
            <h2>GDE - Plataforma de Treinamentos</h2>
        </div>

        <div id="telaInicial">
            <div class="cards-container">
                <div class="card" onclick="abrirModulo('seguranca')">
                    <div class="card-icon">🛡️</div>
                    <div class="card-title">Segurança no Trabalho</div>
                    <div class="card-desc">EPIs e Prevenção de Acidentes</div>
                    <button class="card-btn">ACESSAR</button>
                </div>

                <div class="card" onclick="abrirModulo('lideranca')">
                    <div class="card-icon">👔</div>
                    <div class="card-title">Líder de Excelência</div>
                    <div class="card-desc">Desenvolvimento de Habilidades</div>
                    <button class="card-btn">ACESSAR</button>
                </div>

                <div class="card" onclick="abrirModulo('arena')">
                    <div class="card-icon">🎮</div>
                    <div class="card-title">Arena Ao Vivo</div>
                    <div class="card-desc">Quiz e Nuvem em Tempo Real</div>
                    <button class="card-btn">ACESSAR</button>
                </div>
            </div>
        </div>

        <div id="telaModulo" class="hidden">
            <button class="btn-voltar" onclick="voltarInicio()">← Voltar</button>
            <div id="conteudoModulo"></div>
        </div>

        <!-- TELA ALUNO -->
        <div id="telaAluno" class="hidden">
            <div id="conteudoAluno"></div>
        </div>

        <div id="modalLogin" class="modal">
            <div class="modal-content">
                <h2 id="modalTitulo">Acessar Módulo</h2>
                <input type="password" id="inputSenha" placeholder="Senha">
                <input type="text" id="inputNome" placeholder="Seu Nome">
                <input type="email" id="inputEmail" placeholder="Seu Email">
                <button onclick="validarLogin()">ENTRAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyARUq5PhuNa45_Na6SNPveRX_lcucTRkRA",
            authDomain: "dislub-equador.firebaseapp.com",
            databaseURL: "https://dislub-equador-default-rtdb.firebaseio.com",
            projectId: "dislub-equador",
            storageBucket: "dislub-equador.firebasestorage.app",
            messagingSenderId: "160052415363",
            appId: "1:160052415363:web:f17df9700cd511122504b6",
            measurementId: "G-SHMCTNHGBX"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        console.log('🔥 Firebase inicializado com sucesso!');
        
        window.firebaseDB = database;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebaseUpdate = update;
        window.firebaseReady = true;
    </script>

    <script>
        const MODULOS = {
            seguranca: {
                nome: 'Segurança no Trabalho',
                senha: 'Seguranca2026',
                mensagem: 'Módulo de segurança em desenvolvimento.'
            },
            lideranca: {
                nome: 'Líder de Excelência',
                senha: 'Lider2026',
                mensagem: 'Módulo de liderança em desenvolvimento.'
            },
            arena: {
                nome: 'Arena Ao Vivo',
                senha: 'Arena2026GDE',
                tipo: 'arena'
            }
        };

        const PERGUNTAS = {
            quiz1: [
                {
                    pergunta: "O que significa EPI?",
                    opcoes: [
                        "Equipamento de Proteção Individual",
                        "Equipamento de Produção Industrial",
                        "Equipamento Pessoal Interno",
                        "Equipamento de Processo Industrial"
                    ],
                    correta: 0
                },
                {
                    pergunta: "Qual a cor da luva para trabalho elétrico?",
                    opcoes: [
                    "Amarela",
                    "Vermelha",
                    "Laranja",
                    "Branca"
            ],
            correta: 2  // C = Laranja
        },
        {
                pergunta: "Qual a cor da luva para trabalho elétrico?",
                opcoes: [
                    "Amarela",
                    "Vermelha",
                    "Laranja",
                    "Branca"
            ],
            correta: 2  // C = Laranja
        },
        {
            pergunta: "Qual a cor da luva para trabalho elétrico?",
            opcoes: [
                "Amarela",
                "Vermelha",
                "Laranja",
                "Branca"
            ],
            correta: 2  // C = Laranja
        },
        {
                    pergunta: "Qual a finalidade do capacete de segurança?",
                    opcoes: [
                        "Proteger contra ruídos",
                        "Proteger contra impactos na cabeça",
                        "Proteger contra produtos químicos",
                        "Proteger contra quedas"
                    ],
                    correta: 1
                }
            ]
        };

        let moduloAtual = null;
        let sessaoAtual = null;
        let nomeAluno = null;
        let pontosAluno = 0;

        function abrirModulo(id) {
            moduloAtual = id;
            const modulo = MODULOS[id];
            document.getElementById('modalTitulo').textContent = modulo.nome;
            document.getElementById('modalLogin').classList.add('active');
        }

        function validarLogin() {
            const senha = document.getElementById('inputSenha').value;
            const nome = document.getElementById('inputNome').value;
            const email = document.getElementById('inputEmail').value;
            const modulo = MODULOS[moduloAtual];

            if (senha === modulo.senha && nome && email) {
                document.getElementById('modalLogin').classList.remove('active');
                mostrarModulo();
            } else {
                alert('Preencha todos os campos corretamente!');
            }
        }

        function mostrarModulo() {
            const modulo = MODULOS[moduloAtual];
            document.getElementById('telaInicial').classList.add('hidden');
            document.getElementById('telaModulo').classList.remove('hidden');
            
            const conteudo = document.getElementById('conteudoModulo');
            
            if (modulo.tipo === 'arena') {
                mostrarArena(conteudo);
            } else {
                conteudo.innerHTML = `
                    <div class="modulo-screen">
                        <h1>${modulo.nome}</h1>
                        <p>${modulo.mensagem}</p>
                    </div>
                `;
            }
        }

        function voltarInicio() {
            document.getElementById('telaModulo').classList.add('hidden');
            document.getElementById('telaAluno').classList.add('hidden');
            document.getElementById('telaInicial').classList.remove('hidden');
            document.getElementById('inputSenha').value = '';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputEmail').value = '';
        }

        function mostrarArena(container) {
            container.innerHTML = `
                <div class="arena-container">
                    <div class="arena-card">
                        <h2>🎮 Arena Ao Vivo - Criar Sessão</h2>
                        
                        <label>Nome da Sessão:</label>
                        <input type="text" id="nomeSessao" placeholder="Ex: DDS Terça-feira">
                        
                        <label>Selecione Atividades:</label>
                        <div style="margin: 15px 0;">
                            <label><input type="checkbox" id="quiz1" checked> Quiz: EPIs Básicos</label><br>
                            <label><input type="checkbox" id="nuvem1"> Nuvem de Palavras</label><br>
                            <label><input type="checkbox" id="quiz2"> Quiz: NR-6</label>
                        </div>
                        
                        <label>Modo:</label>
                        <select id="modoSessao">
                            <option value="individual">Individual</option>
                            <option value="equipes">Por Equipes</option>
                        </select>
                        
                        <button class="btn-arena" onclick="criarSessao()">🚀 CRIAR SESSÃO</button>
                    </div>
                </div>
            `;
        }

        function criarSessao() {
            const nome = document.getElementById('nomeSessao').value;
            if (!nome) {
                alert('Digite o nome da sessão!');
                return;
            }

            const codigo = gerarCodigo();
            const atividades = [];
            if (document.getElementById('quiz1').checked) atividades.push('quiz1');
            if (document.getElementById('nuvem1').checked) atividades.push('nuvem1');
            if (document.getElementById('quiz2').checked) atividades.push('quiz2');

            if (atividades.length === 0) {
                alert('Selecione pelo menos uma atividade!');
                return;
            }

            const modo = document.getElementById('modoSessao').value;
            const linkSessao = window.location.origin + window.location.pathname + '?codigo=' + codigo;

            sessaoAtual = codigo;

            document.getElementById('conteudoModulo').innerHTML = `
                <div class="arena-container">
                    <div class="arena-card">
                        <h2>✅ Sessão Criada com Sucesso!</h2>
                        
                        <div class="sessao-info">
                            <h3>📋 Informações da Sessão</h3>
                            <p><strong>Nome:</strong> ${nome}</p>
                            <p><strong>Modo:</strong> ${modo === 'individual' ? '👤 Individual' : '👥 Equipes'}</p>
                            <p><strong>Atividades:</strong> ${atividades.length}</p>
                        </div>
                        
                        <h3 style="text-align: center; margin: 30px 0 10px 0;">Código da Sessão:</h3>
                        <div class="codigo-sessao">${codigo}</div>
                        
                        <div id="qrcodeArena"></div>
                        
                        <div style="text-align: center; margin: 20px 0;">
                            <p><strong>Link:</strong></p>
                            <p style="word-break: break-all; color: #666;">${linkSessao}</p>
                            <button class="btn-arena" onclick="copiarLink('${linkSessao}')">📋 Copiar Link</button>
                        </div>

                        <div class="participantes-count" id="participantesCount">
                            👥 Participantes conectados: <span id="countNum">0</span>
                        </div>
                        
                        <button class="btn-arena" style="width: 100%;" onclick="iniciarQuiz()">▶ INICIAR QUIZ</button>
                        
                        <button class="btn-voltar" onclick="voltarInicio()" style="width: 100%; margin-top: 20px;">← Criar Nova Sessão</button>
                    </div>
                </div>
            `;

            setTimeout(() => {
                new QRCode(document.getElementById("qrcodeArena"), {
                    text: linkSessao,
                    width: 200,
                    height: 200
                });
            }, 100);

            salvarSessaoFirebase(codigo, nome, atividades, modo);
            monitorarParticipantes(codigo);
        }

        function monitorarParticipantes(codigo) {
            if (window.firebaseReady) {
                const participantesRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/participantes');
                window.firebaseOnValue(participantesRef, (snapshot) => {
                    const participantes = snapshot.val();
                    const count = participantes ? Object.keys(participantes).length : 0;
                    const countEl = document.getElementById('countNum');
                    if (countEl) {
                        countEl.textContent = count;
                    }
                });
            }
        }

        function iniciarQuiz() {
            if (window.firebaseReady && sessaoAtual) {
                const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + sessaoAtual);
                window.firebaseUpdate(sessaoRef, {
                    status: 'quiz_ativo',
                    perguntaAtual: 0,
                    timestamp: Date.now()
                });
                alert('✅ Quiz iniciado!\n\nOs alunos já podem ver a primeira pergunta!');
            }
        }

        function gerarCodigo() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let codigo = '';
            for (let i = 0; i < 6; i++) {
                codigo += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return codigo;
        }

        function copiarLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ Link copiado!\n\nCompartilhe com seus alunos.');
            });
        }

        function salvarSessaoFirebase(codigo, nome, atividades, modo) {
            if (window.firebaseReady) {
                const sessaoData = {
                    nome: nome,
                    atividades: atividades,
                    modo: modo,
                    status: 'aguardando',
                    criado: new Date().toISOString(),
                    participantes: {}
                };
                
                const dbRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                window.firebaseSet(dbRef, sessaoData)
                    .then(() => {
                        console.log('🔥 Sessão salva no Firebase:', codigo);
                        console.log('📦 Dados:', sessaoData);
                    })
                    .catch((error) => {
                        console.error('❌ Erro ao salvar:', error);
                    });
            }
        }

        // TELA DO ALUNO
        function mostrarTelaAluno(codigo) {
            document.getElementById('telaInicial').classList.add('hidden');
            document.getElementById('telaAluno').classList.remove('hidden');
            
            const conteudo = document.getElementById('conteudoAluno');
            conteudo.innerHTML = `
                <div class="aluno-screen">
                    <h1>🎮 Arena Ao Vivo</h1>
                    <p>Código: <strong>${codigo}</strong></p>
                    
                    <div style="margin: 30px 0;">
                        <input type="text" id="nomeAlunoInput" placeholder="Digite seu nome" 
                               style="width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; margin: 10px 0;">
                        <button class="btn-arena" style="width: 100%;" onclick="entrarSessao('${codigo}')">
                            ENTRAR NA SESSÃO
                        </button>
                    </div>
                </div>
            `;
        }

        function entrarSessao(codigo) {
            const nome = document.getElementById('nomeAlunoInput').value.trim();
            if (!nome) {
                alert('Digite seu nome!');
                return;
            }

            nomeAluno = nome;
            const alunoId = nome.toLowerCase().replace(/[^a-z0-9]/g, '_');

            if (window.firebaseReady) {
                const alunoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/participantes/' + alunoId);
                window.firebaseSet(alunoRef, {
                    nome: nome,
                    pontos: 0,
                    conectado: true,
                    timestamp: Date.now()
                });

                mostrarAguardando(codigo, nome);
                escutarSessao(codigo, alunoId);
            }
        }

        function mostrarAguardando(codigo, nome) {
            const conteudo = document.getElementById('conteudoAluno');
            conteudo.innerHTML = `
                <div class="aluno-screen">
                    <h1>✅ Conectado!</h1>
                    <p style="font-size: 20px; margin: 20px 0;">Olá, <strong>${nome}</strong>!</p>
                    
                    <div class="status-aguardando">
                        <h3>⏳ Aguardando instrutor iniciar...</h3>
                        <p>Fique atento! O quiz começará em breve.</p>
                    </div>

                    <div class="pontos-display">
                        🏆 Seus pontos: <span id="pontosAluno">0</span>
                    </div>
                </div>
            `;
        }

        function escutarSessao(codigo, alunoId) {
            if (window.firebaseReady) {
                const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                window.firebaseOnValue(sessaoRef, (snapshot) => {
                    const sessao = snapshot.val();
                    if (sessao) {
                        if (sessao.status === 'quiz_ativo' && sessao.perguntaAtual !== undefined) {
                            mostrarPergunta(codigo, alunoId, sessao.perguntaAtual);
                        }
                    }
                });
            }
        }

        function mostrarPergunta(codigo, alunoId, indice) {
            const pergunta = PERGUNTAS.quiz1[indice];
            if (!pergunta) return;

            const conteudo = document.getElementById('conteudoAluno');
            conteudo.innerHTML = `
                <div class="aluno-screen">
                    <div class="pontos-display">
                        🏆 Seus pontos: <span id="pontosAluno">${pontosAluno}</span>
                    </div>

                    <div class="quiz-pergunta">
                        <h2>${pergunta.pergunta}</h2>
                        <div id="opcoesQuiz">
                            ${pergunta.opcoes.map((opcao, i) => `
                                <div class="quiz-opcao" onclick="responder(${i}, ${pergunta.correta}, '${codigo}', '${alunoId}')">
                                    ${String.fromCharCode(65 + i)}) ${opcao}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function responder(escolhida, correta, codigo, alunoId) {
            const opcoes = document.querySelectorAll('.quiz-opcao');
            opcoes.forEach(opcao => opcao.style.pointerEvents = 'none');

            const acertou = escolhida === correta;
            
            opcoes[escolhida].classList.add(acertou ? 'correta' : 'errada');
            if (!acertou) {
                opcoes[correta].classList.add('correta');
            }

            if (acertou) {
                pontosAluno += 100;
                document.getElementById('pontosAluno').textContent = pontosAluno;

                if (window.firebaseReady) {
                    const alunoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo + '/participantes/' + alunoId);
                    window.firebaseUpdate(alunoRef, {
                        pontos: pontosAluno
                    });
                }
            }

            setTimeout(() => {
                mostrarAguardando(codigo, nomeAluno);
            }, 3000);
        }

        window.addEventListener('load', function() {
            console.log('✅ Página carregada');
            
            const params = new URLSearchParams(window.location.search);
            const codigo = params.get('codigo');
            
            if (codigo) {
                console.log('🎮 Código detectado:', codigo);
                
                if (window.firebaseReady) {
                    const sessaoRef = window.firebaseRef(window.firebaseDB, 'sessions/' + codigo);
                    window.firebaseOnValue(sessaoRef, (snapshot) => {
                        const sessao = snapshot.val();
                        if (sessao) {
                            console.log('✅ Sessão encontrada:', sessao.nome);
                            mostrarTelaAluno(codigo);
                        } else {
                            alert('❌ Sessão não encontrada: ' + codigo);
                        }
                    }, { onlyOnce: true });
                }
            }
        });
    </script>
</body>
</html>
